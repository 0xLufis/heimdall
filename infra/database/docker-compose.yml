services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_heimdall
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    networks:
      - heimdall_net
    restart: unless-stopped

  postgres:
    image: postgres:17.9
    container_name: postgres_heimdall
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER_FILE: /run/secrets/pg_user
      POSTGRES_DB: heimdall_dev_db
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pw
      TZ: Europe/Budapest
      PGTZ: Europe/Budapest
    secrets:
      - pg_user
      - pg_pw
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./logs:/var/log/postgresql
      - ./certs:/var/lib/postgresql/certs:ro
      - ./init:/docker-entrypoint-initdb.d
    command: >
      postgres 
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/certs/server.crt
      -c ssl_key_file=/var/lib/postgresql/certs/server.key
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on
      -c log_destination=stderr,csvlog
      -c log_rotation_age=1d
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    networks:
      - heimdall_net
    restart: unless-stopped

networks:
  heimdall_net:
    driver: bridge

secrets:
  pg_user:
    file: ./secrets/pg_user.txt
  pg_pw:
    file: ./secrets/pg_pw.txt
